<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Airport SLA</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:10px; }

.card { background:#1b1b1b; padding:12px; border-radius:8px; }

.ok { color:#86efac; }
.p1 { color:#ff4d4d; }
.p2 { color:#ff944d; }
.p3 { color:#ffd24d; }
.p4 { color:#66ccff; }

.alert { color:#ff4d4d; font-weight:bold; }
</style>
</head>

<body>

<h2>Grupos (SLA)</h2>
<div id="groups" class="grid"></div>

<script>
let groups = [];

function formatTime(ms){
  let s = Math.floor(ms/1000);
  let h = Math.floor(s/3600);
  let m = Math.floor((s%3600)/60);
  let sec = s%60;
  return `${h}h ${m}m ${sec}s`;
}

function getClass(p){
  return p==="P1"?"p1":
         p==="P2"?"p2":
         p==="P3"?"p3":
         p==="P4"?"p4":"ok";
}

function render(){
  let container = document.getElementById("groups");
  container.innerHTML="";

  groups.forEach(g=>{
    let elapsed = "";
    let remaining = "";
    let alert = "";

    if(g.incident_start){
      let start = new Date(g.incident_start);
      let now = new Date();

      let diff = now - start;
      let total = g.sla_hours * 3600000;

      elapsed = formatTime(diff);

      let left = total - diff;
      if(left < 0){
        remaining = "ESTOURADO";
        alert = "alert";
      } else {
        remaining = formatTime(left);

        if(left < (15*3600000)){
          alert = "alert";
        }
      }
    }

    container.innerHTML += `
      <div class="card">
        <div><b>${g.group}</b></div>
        <div>Down: ${g.down_count}</div>
        <div class="${getClass(g.priority)}">${g.priority}</div>

        ${g.incident_start ? `
          <div>Elapsed: ${elapsed}</div>
          <div class="${alert}">Remaining: ${remaining}</div>
        ` : `<div class="ok">Sem incidente</div>`}
      </div>
    `;
  });
}

async function load(){
  let res = await fetch("/api/groups");
  groups = await res.json();
  render();
}

setInterval(load, 1000);
load();
</script>

</body>
</html>
