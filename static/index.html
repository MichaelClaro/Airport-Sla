<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airport SLA Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 16px;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .meta {
      color: #bbb;
      font-size: 13px;
    }

    .status {
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      display: inline-block;
      font-weight: bold;
      font-size: 12px;
    }

    .operational { background: #14532d; color: #86efac; }
    .down { background: #7f1d1d; color: #fca5a5; }

    .priority {
      margin-top: 8px;
      font-weight: bold;
      font-size: 13px;
    }

    .p1 { color: #ff4d4d; }
    .p2 { color: #ff944d; }
    .p3 { color: #ffd24d; }
    .p4 { color: #66ccff; }
    .ok { color: #86efac; }

    .btn {
      margin-top: 10px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .btn-red { background: #dc2626; color: white; }
    .btn-green { background: #16a34a; color: white; }

  </style>
</head>
<body>

  <h1>Airport SLA Dashboard</h1>

  <h2>Grupos (SLA)</h2>
  <div class="grid" id="groups"></div>

  <h2>Equipamentos</h2>
  <div class="grid" id="gates"></div>

  <script>
    let gates = [];
    let groups = [];

    async function loadData() {
      const gatesRes = await fetch("/api/gates");
      const groupsRes = await fetch("/api/groups");

      gates = await gatesRes.json();
      groups = await groupsRes.json();

      renderGroups();
      renderGates();
    }

    async function toggleStatus(id) {
      const gate = gates.find(g => g.id === id);
      if (!gate) return;

      const newStatus = gate.status === "Operational" ? "Down" : "Operational";

      await fetch(`/api/gates/${id}/status`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus })
      });

      await loadData();
    }

    function getPriorityClass(p) {
      if (p === "P1") return "p1";
      if (p === "P2") return "p2";
      if (p === "P3") return "p3";
      if (p === "P4") return "p4";
      return "ok";
    }

    function renderGroups() {
      const container = document.getElementById("groups");
      container.innerHTML = "";

      groups.forEach(g => {
        container.innerHTML += `
          <div class="card">
            <div class="name">${g.group}</div>
            <div class="meta">${g.down_count} down / ${g.total_gates}</div>
            <div class="priority ${getPriorityClass(g.priority)}">
              ${g.priority}
            </div>
          </div>
        `;
      });
    }

    function renderGates() {
      const container = document.getElementById("gates");
      container.innerHTML = "";

      gates.forEach(g => {
        const isDown = g.status === "Down";

        container.innerHTML += `
          <div class="card">
            <div class="name">${g.name}</div>
            <div class="meta">${g.group}</div>
            <div class="status ${isDown ? "down" : "operational"}">
              ${g.status}
            </div>
            <button class="btn ${isDown ? "btn-green" : "btn-red"}"
              onclick="toggleStatus(${g.id})">
              ${isDown ? "Voltar" : "Down"}
            </button>
          </div>
        `;
      });
    }

    loadData();
  </script>

</body>
</html>
